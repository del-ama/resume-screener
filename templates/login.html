<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Resume Screener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #F7FAFC;
      color: #2D3748;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      color: #2C5282;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .logo p {
      color: #718096;
      font-size: 13px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #4A5568;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #CBD5E0;
      border-radius: 6px;
      margin-bottom: 18px;
      font-family: Arial, sans-serif;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #2C5282;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #2C5282;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #1A365D; }

    .error {
      background: #FFF5F5;
      border: 1px solid #FC8181;
      color: #C53030;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>Resume Screener</h1>
      <p>Sign in to continue</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="Enter your username" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter your password" autocomplete="current-password" required>

      <button class="btn" type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
